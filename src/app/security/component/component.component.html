<div class="login-page">
  <mat-card class="login-card mat-elevation-z8">
    <div class="login-card-header">
      <div class="login-logo">
        <mat-icon class="login-logo-icon">groups</mat-icon>
      </div>
      <h1 class="login-title">BGI Employee Info</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <mat-card-content>
      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input id="username" formControlName="username" matInput autocomplete="username" />
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input id="password" type="password" formControlName="password" matInput autocomplete="current-password" />
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <button
          mat-raised-button
          color="warn"
          class="login-btn"
          type="submit"
          (click)="login()"
          [disabled]="loginForm.invalid"
        >
          <mat-icon>login</mat-icon>
          Sign In
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="login-footer">
      <p>BGI Ethiopia &copy; {{ currentYear }}</p>
    </mat-card-footer>
  </mat-card>
</div>
