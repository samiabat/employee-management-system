<div class="dashboard-container">
  <div class="page-header">
    <h2>
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </h2>
    <span class="subtitle">Welcome to BGI Employee Info System</span>
  </div>

  <div class="summary-cards">
    <mat-card
      *ngFor="let card of summaryCards"
      class="summary-card mat-elevation-z4"
      (click)="navigate(card.route)"
    >
      <mat-card-content class="card-content">
        <div class="card-icon-wrap" [style.background]="card.bg">
          <mat-icon [style.color]="card.color">{{ card.icon }}</mat-icon>
        </div>
        <div class="card-info">
          <div class="card-value">{{ card.value }}</div>
          <div class="card-title">{{ card.title }}</div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="quick-links">
    <h3>Quick Actions</h3>
    <div class="quick-links-row">
      <button mat-raised-button color="primary" (click)="navigate('employees')">
        <mat-icon>person_add</mat-icon>
        Manage Employees
      </button>
      <button mat-raised-button color="accent" (click)="navigate('roles')">
        <mat-icon>playlist_add</mat-icon>
        Manage Roles
      </button>
      <button mat-raised-button (click)="navigate('sectors')">
        <mat-icon>add_business</mat-icon>
        Manage Sectors
      </button>
    </div>
  </div>
</div>
