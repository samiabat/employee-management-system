<div class="confirm-dialog">
  <div class="warning-icon-wrap">
    <mat-icon class="warning-icon">delete_forever</mat-icon>
  </div>

  <h2 class="confirm-title">Delete Record?</h2>
  <p class="confirm-desc">
    This action <strong>cannot be undone</strong>. The record will be permanently deleted from the system.
    Are you sure you want to proceed?
  </p>

  <div class="confirm-actions">
    <button mat-stroked-button class="cancel-btn" mat-dialog-close>
      <mat-icon>close</mat-icon>
      Cancel
    </button>
    <button mat-raised-button class="delete-btn" (click)="onConfirmDelete()">
      <mat-icon>delete</mat-icon>
      Delete Permanently
    </button>
  </div>
</div>
