<div class="list-container">
  <div class="list-header">
    <div>
      <h2 class="list-title">
        <mat-icon>segment</mat-icon>
        Sectors
      </h2>
      <p class="list-subtitle">
        Manage company sectors
        <span class="count-badge" *ngIf="dSource">{{ dSource.data.length }} Total</span>
      </p>
    </div>
    <button mat-raised-button class="add-btn-primary" (click)="addSector()">
      <mat-icon>add_business</mat-icon>
      Add Sector
    </button>
  </div>

  <div class="search-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search sectors…" #input>
    </mat-form-field>
  </div>

  <div class="table-card">
    <table mat-table [dataSource]="dSource" matSort>
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let row" class="id-cell"> #{{ row.id }} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let row" class="name-cell">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="created_date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Created Date </th>
        <td mat-cell *matCellDef="let row" class="date-cell">{{ row.created_date || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="createdBy">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Created By </th>
        <td mat-cell *matCellDef="let row" class="muted-cell">{{ row.created_by || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="det">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [matMenuTriggerFor]="menu" class="actions-btn">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="editSector(row)">
              <mat-icon style="color:#1d4ed8">edit</mat-icon>
              <span>Edit</span>
            </button>
            <button mat-menu-item (click)="deleteSector(row)">
              <mat-icon style="color:#c62828">delete</mat-icon>
              <span>Delete</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="d_Colums; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: d_Colums;" class="data-row"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data-cell" [attr.colspan]="d_Colums.length">
          <mat-icon>search_off</mat-icon>
          <span>No sectors matching "{{ input.value }}"</span>
        </td>
      </tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of sectors"></mat-paginator>
  </div>
</div>
