<div class="page-header">
  <h2>
    <mat-icon>segment</mat-icon>
    Sectors
  </h2>
  <button mat-raised-button color="warn" (click)="addSector()">
    <mat-icon>add_business</mat-icon>
    Add Sector
  </button>
</div>

<mat-form-field appearance="outline" class="filter-field">
  <mat-label>Search sectors</mat-label>
  <mat-icon matPrefix>search</mat-icon>
  <input matInput (keyup)="applyFilter($event)" placeholder="Sector name…" #input>
</mat-form-field>

<div class="mat-elevation-z4 table-container">
  <table mat-table [dataSource]="dSource" matSort>
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{row.id}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let row"> {{row.name}} </td>
    </ng-container>

    <ng-container matColumnDef="created_date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Created Date </th>
      <td mat-cell *matCellDef="let row"> {{row.created_date || '—'}} </td>
    </ng-container>

    <ng-container matColumnDef="createdBy">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Created By </th>
      <td mat-cell *matCellDef="let row"> {{row.created_by || '—'}} </td>
    </ng-container>

    <ng-container matColumnDef="det">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Row actions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="editSector(row)">
            <mat-icon color="primary">edit</mat-icon>
            <span>Edit</span>
          </button>
          <button mat-menu-item (click)="deleteSector(row)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="d_Colums"></tr>
    <tr mat-row *matRowDef="let row; columns: d_Colums;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell no-data" [attr.colspan]="d_Colums.length">
        <mat-icon>search_off</mat-icon>
        <span>No data matching "{{input.value}}"</span>
      </td>
    </tr>
  </table>
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of sectors"></mat-paginator>
</div>
